name: Bug report
description: Create a report to help us improve
title: "[BUG] "
labels: [ "bug" ]
assignees: [ ]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: commands-run
    attributes:
      label: Commands Run
      description: Please share the exact command you ran
      placeholder: |
        anime-dl get "naruto"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: anime-dl version
      description: What version of anime-pahe-dl are you running? (Check with `pip show anime-pahe-dl` or look at your install method)
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true
